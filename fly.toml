# fly.toml app configuration file generated for bop-wispy-voice-3017 on 2025-11-14T16:41:13-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bop-wispy-voice-3017'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  BOP_USE_CONSTRAINTS = 'true'
  PORT = '8080'
  FLY_APP_NAME = 'bop-wispy-voice-3017'

[processes]
  app = "sh -c 'uv run python -m uvicorn bop.server:app --host 0.0.0.0 --port ${PORT:-8080}'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
  
  # Private networking - only accessible via Fly.io private network
  # Remove public IPs to make it private
  # Access via: fly proxy 8080:8080 or via Fly.io WireGuard VPN

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

# Persistent storage for caching (tool results, LLM responses, sessions)
# Volume: bop_cache (1GB) created in region iad
[[mounts]]
  source = "bop_cache"
  destination = "/data"
